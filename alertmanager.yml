route:
  receiver: "jenkins-rollback-webhook"
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1m

receivers:
  - name: "jenkins-rollback-webhook"
    webhook_configs:
      - url: "http://13.60.17.141:8080/generic-webhook-trigger/invoke?token=ROLLBACK_875836_TOKEN"
        send_resolved: false
        http_config:
          basic_auth:
            username: "JENKINS_USERNAME_HERE"
            password: "JENKINS_API_TOKEN_HERE"
